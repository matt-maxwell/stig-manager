 # STIG Manager behind Proxy with DNS Hostname
networks:
  default:
    name: stigman-orchestration_default
    external: false

volumes:
  auth_db:

services:
  nginx:
    image: nginx:1.23.1
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/index.html:/usr/share/nginx/html/index.html
      - /var/docker/stigman/logs:/var/log/nginx
      - ./certs/localhost/certificate.pem:/etc/nginx/certificate.pem
      - ./certs/localhost/private.key:/etc/nginx/private.key
    ports:
    - "443:443"
    restart: unless-stopped
  auth-db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - auth_db:/var/lib/postgresql/data
  auth:
    image: quay.io/keycloak/keycloak:19.0.2
    restart: always
    volumes:
      - ./kc/stigman_realm.json:/opt/keycloak/data/import/stigman_realm.json
    depends_on:
      - auth-db
    environment:
      - KC_DB=${$KC_DB}
      - KC_DB_USERNAME=${KC_DB_USERNAME}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_DB_URL_HOST=${KC_DB_URL_HOST}
      - KC_DB_URL_PORT=${KC_DB_URL_PORT}
      - KC_DB_URL_DATABASE=${KC_DB_URL_DATABASE}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_PROXY=${KC_PROXY}
      - KC_HOSTNAME=${KC_HOSTNAME}
      - KC_HOSTNAME_ADMIN_URL=${KC_HOSTNAME_ADMIN_URL}
    command: start --import-realm
  db:
    image: mysql:8.0.38
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    cap_add:
      - SYS_NICE  # workaround MySQL logging bug => mbind: Operation not permitted
    command: --innodb_buffer_pool_size=512M --sort_buffer_size=128M
    volumes:
      - ./mysql-data:/var/lib/mysql
  stigman:
    image: nuwcdivnpt/stig-manager:latest
    environment:
      - STIGMAN_OIDC_PROVIDER=${STIGMAN_CLIENT_OIDC_PROVIDER}
      - STIGMAN_CLIENT_OIDC_PROVIDER=${STIGMAN_CLIENT_OIDC_PROVIDER}
      - STIGMAN_CLASSIFICATION=${STIGMAN_CLASSIFICATION}
      - STIGMAN_DB_HOST=${STIGMAN_DB_HOST}
      - STIGMAN_DB_PASSWORD=${STIGMAN_DB_PASSWORD}
      - STIGMAN_DB_USER=${STIGMAN_DB_USER}
      - STIGMAN_DEV_ALLOW_INSECURE_TOKENS=${STIGMAN_DEV_ALLOW_INSECURE_TOKENS}
    init: true
    depends_on:
    - auth
